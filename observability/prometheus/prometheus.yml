global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: query-engine
    metrics_path: /metrics
    static_configs:
      - targets:
          - query-engine-caddy:80

  - job_name: spider
    metrics_path: /metrics
    static_configs:
      - targets:
          - spider-service:8080

  - job_name: pipeline-workers
    metrics_path: /metrics
    static_configs:
      - targets:
          - indexer-service:8080
          - image-indexer-service:8080
          - backlinks-processor-service:8080
          - tfidf-service:8080
          - page-rank-service:8080

  - job_name: redis
    static_configs:
      - targets:
          - query-redis:6379
          - pipeline-redis:6379

  - job_name: mongo
    static_configs:
      - targets:
          - mongo:27017
