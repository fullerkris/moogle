apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

nameSuffix: -staging

patches:
  - target:
      kind: Ingress
      name: moogle-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: staging.moogle.local
  - target:
      kind: Deployment
      name: query-engine
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
