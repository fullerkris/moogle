apiVersion: v1
kind: ConfigMap
metadata:
  name: query-engine-caddyfile
data:
  Caddyfile: |
    :80 {
        encode gzip zstd

        @api path /api/*
        reverse_proxy @api query-engine:9000 {
            transport fastcgi {
                split .php
                read_timeout 30s
                write_timeout 30s
            }
        }

        reverse_proxy query-engine:9000 {
            transport fastcgi {
                split .php
                read_timeout 30s
                write_timeout 30s
            }
        }
    }
