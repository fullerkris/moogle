apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-engine
  template:
    metadata:
      labels:
        app: query-engine
    spec:
      containers:
        - name: query-engine
          image: query-engine-image:latest
          ports:
            - containerPort: 9000
          envFrom:
            - configMapRef:
                name: moogle-runtime
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
