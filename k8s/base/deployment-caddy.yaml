apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-engine-caddy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-engine-caddy
  template:
    metadata:
      labels:
        app: query-engine-caddy
    spec:
      containers:
        - name: caddy
          image: caddy:2
          ports:
            - containerPort: 80
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
          readinessProbe:
            httpGet:
              path: /api/health/live
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: caddyfile
          configMap:
            name: query-engine-caddyfile
